<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Before / After Slider</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="minimal">
    <div class="ba-embed" id="ba-embed" aria-label="Before/After image">
      <div class="ba-slider" id="ba-slider">
        <img src="images/before.png" alt="Before" id="img-before" class="ba-image">
        <div class="ba-overlay" id="overlay">
          <img src="images/after.png" alt="After" id="img-after" class="ba-image">
        </div>
        <div class="ba-handle" id="handle" tabindex="0" role="slider" aria-valuemin="0" aria-valuemax="100" aria-valuenow="50" aria-label="Ajustar antes e depois"></div>
      </div>
      <input type="range" id="range" min="0" max="100" value="50" class="sr-only" aria-hidden="true">
    </div>
  </main>

  <script src="slider.js"></script>
</body>
</html>
